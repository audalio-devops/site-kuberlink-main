name: Build and Deploy to GCS

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.6

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-build
          path: ./out/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: site-build
          path: ./out/

      - name: Authenticate to Google Cloud (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/42314965279/locations/global/workloadIdentityPools/pool-github/providers/github-actions-provider'
          service_account: 'github-actions@kuberlink-management.iam.gserviceaccount.com'

      - name: Install gcloud CLI components
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: 'kuberlink-management'

      - name: Deploy to GCS
        run: |
          gsutil -m -o "GSUtil:parallel_process_count=1" cp -r -z js,css ./out/* gs://site-kuberlink-production
          gsutil iam ch allUsers:objectViewer gs://site-kuberlink-production
